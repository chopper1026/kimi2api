services:
  kimi2api:
    build: .
    container_name: kimi2api
    ports:
      - "${PORT:-8000}:8000"
    env_file:
      - .env
    environment:
      - HOST=0.0.0.0
      - PORT=8000
      - TIMEZONE=${TIMEZONE:-Asia/Shanghai}
      - TZ=${TZ:-Asia/Shanghai}
    volumes:
      - ./data:/app/data
    restart: unless-stopped
