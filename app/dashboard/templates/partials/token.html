<div class="max-w-2xl space-y-6">
    <div class="bg-gray-900 border border-gray-800 rounded-xl p-6">
        <h2 class="text-lg font-semibold mb-4">Token 状态</h2>
        <div class="space-y-3">
            <div class="flex justify-between py-2 border-b border-gray-800">
                <span class="text-gray-400">类型</span>
                <span class="font-mono text-sm">{{ token_type }}</span>
            </div>
            <div class="flex justify-between py-2 border-b border-gray-800">
                <span class="text-gray-400">过期时间</span>
                <span class="font-mono text-sm">{{ token_expires }}</span>
            </div>
            <div class="flex justify-between py-2 border-b border-gray-800">
                <span class="text-gray-400">Token 预览</span>
                <span class="font-mono text-sm text-gray-500">{{ token_preview }}</span>
            </div>
            <div class="flex justify-between py-2">
                <span class="text-gray-400">健康状态</span>
                <span class="text-sm {{ 'text-green-400' if token_healthy else 'text-yellow-400' }}">{{ '正常' if token_healthy else '需要刷新' }}</span>
            </div>
        </div>
    </div>

    <div class="flex gap-3">
        <button hx-post="/admin/token/refresh" hx-target="#token-panel" hx-swap="outerHTML"
                class="px-4 py-2 bg-brand-600 hover:bg-brand-700 rounded-lg text-sm font-medium transition-colors">
            <span class="htmx-indicator">刷新中...</span>
            手动刷新 Token
        </button>
        <button hx-get="/admin/token/validate" hx-target="#validate-result" hx-swap="innerHTML"
                class="px-4 py-2 bg-gray-800 hover:bg-gray-700 rounded-lg text-sm font-medium transition-colors border border-gray-700">
            验证 Token
        </button>
    </div>
    <div id="validate-result"></div>

    {% if subscription %}
    <div class="bg-gray-900 border border-gray-800 rounded-xl p-6">
        <h2 class="text-lg font-semibold mb-4">订阅信息</h2>
        <pre class="text-xs text-gray-300 bg-gray-950 p-4 rounded-lg overflow-auto max-h-64">{{ subscription }}</pre>
    </div>
    {% endif %}
</div>
