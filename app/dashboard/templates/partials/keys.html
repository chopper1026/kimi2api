<div id="keys-panel" class="space-y-6">
    <div class="flex items-center justify-between">
        <h2 class="text-lg font-semibold">API Keys</h2>
        <button hx-post="/admin/keys" hx-target="#keys-panel" hx-swap="outerHTML"
                hx-prompt="输入新 Key 的名称（可留空自动生成）:"
                class="px-4 py-2 bg-brand-600 hover:bg-brand-700 rounded-lg text-sm font-medium transition-colors">
            + 创建新 Key
        </button>
    </div>

    {% if new_key %}
    <div class="bg-green-900/30 border border-green-700 rounded-xl p-5">
        <p class="text-green-300 font-medium mb-2">新 Key 已创建</p>
        <div class="flex items-center gap-2 bg-gray-950 p-3 rounded-lg">
            <code class="font-mono text-sm text-green-400 break-all">{{ new_key }}</code>
            <button onclick="navigator.clipboard.writeText('{{ new_key }}'); this.innerHTML='<svg class=&quot;w-4 h-4 text-green-400&quot; fill=&quot;none&quot; stroke=&quot;currentColor&quot; viewBox=&quot;0 0 24 24&quot;><path stroke-linecap=&quot;round&quot; stroke-linejoin=&quot;round&quot; stroke-width=&quot;2&quot; d=&quot;M5 13l4 4L19 7&quot;/></svg>'; setTimeout(function(){ this.innerHTML='<svg class=&quot;w-4 h-4 text-gray-400 hover:text-gray-200&quot; fill=&quot;none&quot; stroke=&quot;currentColor&quot; viewBox=&quot;0 0 24 24&quot;><path stroke-linecap=&quot;round&quot; stroke-linejoin=&quot;round&quot; stroke-width=&quot;2&quot; d=&quot;M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z&quot;/></svg>' }.bind(this), 1500)"
                    class="shrink-0 text-gray-500 hover:text-gray-200 transition-colors" title="复制">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"/></svg>
            </button>
        </div>
    </div>
    {% endif %}

    <div class="bg-gray-900 border border-gray-800 rounded-xl overflow-hidden">
        <table class="w-full text-sm">
            <thead>
                <tr class="border-b border-gray-800 text-gray-400 text-xs uppercase tracking-wider">
                    <th class="px-5 py-3 text-left">名称</th>
                    <th class="px-5 py-3 text-left">Key</th>
                    <th class="px-5 py-3 text-left">创建时间</th>
                    <th class="px-5 py-3 text-left">上次使用</th>
                    <th class="px-5 py-3 text-right">请求数</th>
                    <th class="px-5 py-3 text-right">操作</th>
                </tr>
            </thead>
            <tbody>
            {% for k in keys %}
                <tr class="border-b border-gray-800/50 hover:bg-gray-800/50">
                    <td class="px-5 py-3 font-medium">{{ k.name }}</td>
                    <td class="px-5 py-3">
                        <div class="flex items-center gap-2">
                            <code class="text-xs text-gray-500 font-mono">{{ k.key_preview }}</code>
                            <button onclick="navigator.clipboard.writeText('{{ k.key }}'); this.innerHTML='<svg class=&quot;w-4 h-4 text-green-400&quot; fill=&quot;none&quot; stroke=&quot;currentColor&quot; viewBox=&quot;0 0 24 24&quot;><path stroke-linecap=&quot;round&quot; stroke-linejoin=&quot;round&quot; stroke-width=&quot;2&quot; d=&quot;M5 13l4 4L19 7&quot;/></svg>'; setTimeout(function(){ this.innerHTML='<svg class=&quot;w-4 h-4 text-gray-400 hover:text-gray-200&quot; fill=&quot;none&quot; stroke=&quot;currentColor&quot; viewBox=&quot;0 0 24 24&quot;><path stroke-linecap=&quot;round&quot; stroke-linejoin=&quot;round&quot; stroke-width=&quot;2&quot; d=&quot;M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z&quot;/></svg>' }.bind(this), 1500)"
                                    class="shrink-0 text-gray-500 hover:text-gray-200 transition-colors" title="复制">
                                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"/></svg>
                            </button>
                        </div>
                    </td>
                    <td class="px-5 py-3 text-gray-400 text-xs">{{ k.created_at_str }}</td>
                    <td class="px-5 py-3 text-gray-400 text-xs">{{ k.last_used_str }}</td>
                    <td class="px-5 py-3 text-right text-gray-400">{{ k.request_count }}</td>
                    <td class="px-5 py-3 text-right">
                        <button hx-delete="/admin/keys/{{ k.key }}" hx-target="#keys-panel" hx-swap="outerHTML"
                                hx-confirm="确定要吊销 Key「{{ k.name }}」吗？此操作不可撤销。"
                                class="text-red-400 hover:text-red-300 text-xs transition-colors">
                            吊销
                        </button>
                    </td>
                </tr>
            {% endfor %}
            {% if not keys %}
                <tr><td colspan="6" class="px-5 py-8 text-center text-gray-500">暂无 API Key</td></tr>
            {% endif %}
            </tbody>
        </table>
    </div>
</div>
