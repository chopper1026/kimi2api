<!DOCTYPE html>
<html lang="zh-CN" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Kimi2API Dashboard{% endblock %}</title>
    <link rel="icon" href="/static/favicon.svg" type="image/svg+xml">
    <link rel="shortcut icon" href="/favicon.ico">
    <script src="/static/tailwind.min.js"></script>
    <script src="/static/htmx.min.js"></script>
    <script>
        function activateTab(tab) {
            document.querySelectorAll('.nav-link').forEach(function(el) {
                el.classList.remove('bg-brand-600/20', 'text-brand-400');
                el.classList.add('text-gray-400');
            });
            document.querySelectorAll('.nav-link').forEach(function(el) {
                if (el.dataset.tab === tab) {
                    el.classList.remove('text-gray-400');
                    el.classList.add('bg-brand-600/20', 'text-brand-400');
                }
            });
        }
        document.addEventListener('click', function(e) {
            var link = e.target.closest('.nav-link');
            if (link && link.dataset.tab) {
                activateTab(link.dataset.tab);
            }
        });
        window.addEventListener('popstate', function() {
            var path = location.pathname;
            var tab = 'dashboard';
            if (path.includes('/dashboard')) tab = 'dashboard';
            else if (path.includes('/token')) tab = 'token';
            else if (path.includes('/keys')) tab = 'keys';
            else if (path.includes('/logs')) tab = 'logs';
            activateTab(tab);
        });
    </script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: { extend: { colors: { brand: { 50:'#eff6ff',500:'#3b82f6',600:'#2563eb',700:'#1d4ed8' } } } }
        }
    </script>
    <style>
        .htmx-indicator { display:none; }
        .htmx-request .htmx-indicator { display:inline-block; }
        .htmx-request.htmx-indicator { display:inline-block; }
    </style>
</head>
<body class="bg-gray-950 text-gray-100 min-h-screen">
{% if not authenticated %}
<div class="flex items-center justify-center min-h-screen">
    <div class="w-full max-w-sm p-8 bg-gray-900 rounded-2xl shadow-xl border border-gray-800">
        <h1 class="text-2xl font-bold text-center mb-2">Kimi2API</h1>
        <p class="text-gray-400 text-center text-sm mb-6">管理控制台登录</p>
        {% if error %}
        <div class="mb-4 p-3 bg-red-900/50 border border-red-700 rounded-lg text-red-300 text-sm">{{ error }}</div>
        {% endif %}
        <form method="POST" action="/admin/login" class="space-y-4">
            <input type="password" name="password" placeholder="管理员密码" required autofocus
                   class="w-full px-4 py-3 bg-gray-800 border border-gray-700 rounded-lg focus:outline-none focus:ring-2 focus:ring-brand-500 focus:border-transparent text-gray-100 placeholder-gray-500">
            <button type="submit" class="w-full py-3 bg-brand-600 hover:bg-brand-700 rounded-lg font-medium transition-colors">
                登录
            </button>
        </form>
    </div>
</div>
{% else %}
<meta name="csrf-token" content="{{ csrf_token }}">
<script>
    document.addEventListener('htmx:configRequest', function(event) {
        var token = document.querySelector('meta[name="csrf-token"]');
        if (token) event.detail.headers['X-CSRF-Token'] = token.content;
    });
</script>
<div class="flex min-h-screen">
    <nav class="w-56 bg-gray-900 border-r border-gray-800 flex flex-col">
        <div class="p-5 border-b border-gray-800">
            <h1 class="text-lg font-bold text-brand-500">Kimi2API</h1>
            <p class="text-xs text-gray-500 mt-1">管理控制台 v{{ version }}</p>
        </div>
        <div id="nav-links" class="flex-1 p-3 space-y-1">
            <button data-tab="dashboard" hx-get="/admin/dashboard" hx-target="#content" hx-swap="innerHTML" hx-push-url="true" class="nav-link w-full flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm cursor-pointer transition-colors hover:bg-gray-800 hover:text-gray-200 {{ 'bg-brand-600/20 text-brand-400' if active_tab == 'dashboard' else 'text-gray-400' }}">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-4 0a1 1 0 01-1-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 01-1 1h-2z"/></svg>
                概览
            </button>
            <button data-tab="token" hx-get="/admin/token" hx-target="#content" hx-swap="innerHTML" hx-push-url="true" class="nav-link w-full flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm cursor-pointer transition-colors hover:bg-gray-800 hover:text-gray-200 {{ 'bg-brand-600/20 text-brand-400' if active_tab == 'token' else 'text-gray-400' }}">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 7a2 2 0 012 2m4 0a6 6 0 01-7.743 5.743L11 17H9v2H7v2H4a1 1 0 01-1-1v-2.586a1 1 0 01.293-.707l5.964-5.964A6 6 0 1121 9z"/></svg>
                Token 管理
            </button>
            <button data-tab="keys" hx-get="/admin/keys" hx-target="#content" hx-swap="innerHTML" hx-push-url="true" class="nav-link w-full flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm cursor-pointer transition-colors hover:bg-gray-800 hover:text-gray-200 {{ 'bg-brand-600/20 text-brand-400' if active_tab == 'keys' else 'text-gray-400' }}">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg>
                API Keys
            </button>
            <button data-tab="logs" hx-get="/admin/logs" hx-target="#content" hx-swap="innerHTML" hx-push-url="true" class="nav-link w-full flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm cursor-pointer transition-colors hover:bg-gray-800 hover:text-gray-200 {{ 'bg-brand-600/20 text-brand-400' if active_tab == 'logs' else 'text-gray-400' }}">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/></svg>
                请求日志
            </button>
        </div>
        <div class="p-3 border-t border-gray-800">
            <form method="POST" action="/admin/logout">
                <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
                <button type="submit" class="w-full flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm text-gray-400 hover:bg-gray-800 hover:text-gray-200 transition-colors">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/></svg>
                    退出登录
                </button>
            </form>
        </div>
    </nav>
    <main class="flex-1 overflow-auto">
        <div id="content" class="p-8">
            {% block content %}{{ tab_content | safe }}{% endblock %}
        </div>
    </main>
</div>
{% endif %}
</body>
</html>
